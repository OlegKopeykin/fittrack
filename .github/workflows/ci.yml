name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

# На main раны последовательны; на PR новый пуш отменяет старый.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race -cover ./...

  web:
    name: Web tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx vitest run --coverage

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Build binary (linux/amd64, embedded SPA)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -tags embedweb -trimpath -ldflags="-s -w" -o fittrack ./cmd/fittrack
      - uses: actions/upload-artifact@v4
        with:
          name: fittrack
          path: fittrack
          retention-days: 7

  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: iphone-15-pro
            browser: webkit
          - project: desktop-chrome
            browser: chromium
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: fittrack
          path: bin
      - run: chmod +x bin/fittrack
      - name: Install Playwright (${{ matrix.browser }})
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run E2E
        working-directory: e2e
        run: npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: e2e/playwright-report
          retention-days: 7

  # Релиз публикуется только на тег версии vX.Y.Z. Автообновление хоста
  # следит за последним релизом. Push в main лишь прогоняет тесты и сборку.
  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: fittrack
      - name: Prepare assets
        run: |
          chmod +x fittrack
          sha256sum fittrack | awk '{print $1}' > fittrack.sha256
          git rev-parse HEAD > fittrack.sha
      - name: Publish release ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" fittrack fittrack.sha256 fittrack.sha \
            --repo "$GITHUB_REPOSITORY" \
            --title "FitTrack ${{ github.ref_name }}" \
            --notes "Версия ${{ github.ref_name }}"
